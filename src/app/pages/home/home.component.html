<header class="lo-flex lo-align-items-center lo-justify-content-between lo-p-2">
    <section class="lo-flex lo-align-items-center lo-justify-content-start lo-gap-8">
        <img src="../../../assets/logo-links-organizer.png" alt="logo" width="50" height="50">
        <h1 class="lo-m-0">Links Organizer</h1>
    </section>
    <button mat-icon-button>
        <mat-icon>person</mat-icon>
    </button>
</header>
<main>
    <div class="lo-w-50 lo-center lo-mtop-4">
        <mat-button-toggle-group hideSingleSelectionIndicator="true" class="lo-w-100" (change)="changeView($event)">
            <mat-button-toggle value="collections" class="lo-w-100" checked="true">Coleções</mat-button-toggle>
            <mat-button-toggle value="links" class="lo-w-100">Links</mat-button-toggle>
        </mat-button-toggle-group>
    </div>
    <router-outlet></router-outlet>
</main>
